<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sync Browser</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    /* ===== ЭКРАН ВХОДА ===== */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a0a0a;
      padding: 16px;
    }

    .auth-card {
      background: #1c1c1e;
      padding: 32px 20px;
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo i { color: #0a84ff; margin-right: 8px; }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #0a0a0a;
      padding: 4px;
      border-radius: 40px;
    }
    .auth-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      color: #888;
      font-weight: 600;
      font-size: 17px;
      border-radius: 36px;
      transition: 0.15s;
    }
    .auth-tab.active {
      background: #0a84ff;
      color: #fff;
    }

    .auth-input {
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 20px;
      color: #fff;
      font-size: 17px;
      outline: none;
    }
    .auth-input:focus { border-color: #0a84ff; }

    .auth-btn {
      width: 100%;
      padding: 18px;
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      margin-top: 16px;
    }
    .auth-btn:active { background: #0066cc; }

    /* ===== ГЛАВНЫЙ ЭКРАН ===== */
    #main-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #000;
    }

    /* Верхняя строка */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #1c1c1e;
      gap: 8px;
      border-bottom: 1px solid #333;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: #2c2c2e;
      border: none;
      color: #0a84ff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:active { background: #3a3a3c; }

    .url-wrapper {
      flex: 1;
      background: #1c1c1e;
      border-radius: 30px;
      padding: 4px 6px 4px 18px;
      border: 1px solid #333;
      display: flex;
      align-items: center;
    }
    .url-wrapper i {
      color: #888;
      margin-right: 10px;
      font-size: 18px;
    }
    .url-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      padding: 14px 0;
      outline: none;
    }
    .url-wrapper button {
      background: #0a84ff;
      border: none;
      color: #fff;
      padding: 10px 18px;
      border-radius: 26px;
      font-size: 16px;
      font-weight: 600;
    }

    .user-btn {
      background: #2c2c2e;
      border: none;
      color: #fff;
      padding: 0 16px;
      height: 48px;
      border-radius: 30px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Панель компаний */
    .companies-row {
      padding: 12px;
      background: #0a0a0a;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      border-bottom: 1px solid #222;
      -webkit-overflow-scrolling: touch;
    }
    .companies-row::-webkit-scrollbar { display: none; }

    .company-chip {
      background: #1c1c1e;
      padding: 12px 20px;
      border-radius: 40px;
      color: #ccc;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #333;
    }
    .company-chip.active {
      background: #0a84ff;
      color: #fff;
      border-color: #0a84ff;
    }
    .company-chip i { font-size: 14px; }

    .create-chip {
      background: transparent;
      border: 1px dashed #0a84ff;
      color: #0a84ff;
    }

    .add-member-row {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #0a0a0a;
      align-items: center;
    }
    .add-member-row input {
      flex: 1;
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 30px;
      padding: 14px 18px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .add-member-row button {
      width: 56px;
      height: 56px;
      border-radius: 30px;
      background: #0a84ff;
      border: none;
      color: #fff;
      font-size: 22px;
    }

    /* iframe */
    .browser-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    /* ===== ПЛАВАЮЩИЙ ЧАТ ===== */
    #chat-container {
      position: fixed;
      bottom: 100px;
      right: 16px;
      width: calc(100vw - 32px);
      max-width: 360px;
      z-index: 9999;
      touch-action: none;
    }

    .chat-window {
      background: #1c1c1e;
      border-radius: 28px;
      border: 1px solid #444;
      overflow: hidden;
      display: none;
      flex-direction: column;
      height: 500px;
      max-height: 65vh;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    .chat-window.open { display: flex; }

    .chat-header {
      padding: 18px 20px;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #333;
      cursor: grab;
    }
    .chat-header:active { cursor: grabbing; }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 24px;
      font-size: 16px;
      line-height: 1.4;
    }
    .msg.mine {
      align-self: flex-end;
      background: #0a84ff;
      color: #fff;
    }
    .msg.other {
      align-self: flex-start;
      background: #2c2c2e;
      color: #fff;
    }
    .msg .name {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .voice-msg {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: #0a84ff;
      border: none;
      color: #fff;
      font-size: 20px;
    }

    .chat-footer {
      padding: 14px;
      background: #0a0a0a;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-footer input {
      flex: 1;
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 40px;
      padding: 16px 20px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .chat-footer button {
      width: 56px;
      height: 56px;
      border-radius: 40px;
      background: #2c2c2e;
      border: none;
      color: #0a84ff;
      font-size: 24px;
    }
    .chat-footer button.rec {
      background: #ff3b30;
      color: #fff;
    }

    .chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 72px;
      height: 72px;
      border-radius: 48px;
      background: #0a84ff;
      border: none;
      color: #fff;
      font-size: 32px;
      box-shadow: 0 6px 20px rgba(10,132,255,0.4);
      z-index: 10000;
    }
    .chat-toggle:active { transform: scale(0.92); }

    /* Модалка */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      padding: 20px;
    }
    .modal-card {
      background: #1c1c1e;
      padding: 28px 24px;
      border-radius: 36px;
      width: 100%;
    }
    .modal-card h3 {
      color: #fff;
      font-size: 24px;
      margin-bottom: 24px;
    }
    .modal-card input {
      width: 100%;
      padding: 18px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 24px;
      color: #fff;
      font-size: 18px;
      margin-bottom: 24px;
      outline: none;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
    }
    .modal-actions button {
      flex: 1;
      padding: 18px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      font-weight: 600;
    }
    .modal-cancel { background: #3a3a3c; color: #fff; }
    .modal-ok { background: #0a84ff; color: #fff; }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      background: #ff3b30;
      color: #fff;
      padding: 16px;
      border-radius: 40px;
      text-align: center;
      font-size: 16px;
      display: none;
      z-index: 15000;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ВХОД -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fab fa-google"></i> Sync
      </div>
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Вход</div>
        <div class="auth-tab" data-tab="register">Регистрация</div>
      </div>
      <div id="login-form">
        <input type="text" id="login-user" class="auth-input" placeholder="Логин" autocomplete="off">
        <input type="password" id="login-pass" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" id="login-btn">Войти</button>
      </div>
      <div id="register-form" style="display:none">
        <input type="text" id="reg-user" class="auth-input" placeholder="Логин" autocomplete="off">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" id="register-btn">Создать аккаунт</button>
      </div>
    </div>
  </div>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="main-screen">
    <div class="top-bar">
      <button class="nav-btn" id="back-btn"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-btn" id="fwd-btn"><i class="fas fa-chevron-right"></i></button>
      <button class="nav-btn" id="refresh-btn"><i class="fas fa-arrow-rotate-right"></i></button>
      <div class="url-wrapper">
        <i class="fas fa-globe"></i>
        <input type="text" id="url-input" value="google.com" placeholder="URL">
        <button id="go-btn">→</button>
      </div>
      <button class="user-btn" id="logout-btn">
        <i class="fas fa-user"></i> <span id="user-name"></span>
      </button>
    </div>

    <div class="companies-row" id="companies-row">
      <div class="company-chip create-chip" id="create-company-btn">
        <i class="fas fa-plus"></i> Новая
      </div>
      <div id="company-chips"></div>
    </div>

    <div class="add-member-row" id="add-member-panel" style="display:none">
      <input type="text" id="add-member-input" placeholder="Логин участника">
      <button id="add-member-btn"><i class="fas fa-user-plus"></i></button>
    </div>

    <iframe id="browser-iframe" class="browser-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>

    <!-- ЧАТ -->
    <div id="chat-container">
      <div class="chat-window" id="chat-window">
        <div class="chat-header" id="chat-drag">
          <span><i class="fas fa-comment"></i> Чат</span>
          <i class="fas fa-times" id="close-chat" style="padding:8px"></i>
        </div>
        <div class="chat-messages" id="chat-msgs"></div>
        <div class="chat-footer">
          <input type="text" id="chat-input" placeholder="Сообщение...">
          <button id="mic-btn"><i class="fas fa-microphone"></i></button>
          <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
    <button class="chat-toggle" id="chat-toggle"><i class="fas fa-comment-dots"></i></button>
  </div>

  <!-- МОДАЛКА -->
  <div class="modal" id="company-modal">
    <div class="modal-card">
      <h3>Новая компания</h3>
      <input type="text" id="new-company-name" placeholder="Название">
      <div class="modal-actions">
        <button class="modal-cancel" id="modal-cancel">Отмена</button>
        <button class="modal-ok" id="modal-create">Создать</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  (function(){
    const socket = io();
    let currentUser = null, currentCompany = null, companies = [];
    let mediaRecorder = null, audioChunks = [], recording = false;

    // Элементы
    const authScr = document.getElementById('auth-screen');
    const mainScr = document.getElementById('main-screen');
    const loginForm = document.getElementById('login-form');
    const regForm = document.getElementById('register-form');
    const userName = document.getElementById('user-name');
    const urlInp = document.getElementById('url-input');
    const iframe = document.getElementById('browser-iframe');
    const chipsDiv = document.getElementById('company-chips');
    const addPanel = document.getElementById('add-member-panel');
    const toast = document.getElementById('toast');
    const chatWin = document.getElementById('chat-window');
    const chatMsgs = document.getElementById('chat-msgs');
    const chatInp = document.getElementById('chat-input');

    // Перетаскивание чата
    const chatCont = document.getElementById('chat-container');
    const dragEl = document.getElementById('chat-drag');
    let drag = false, sx, sy, sl, st;
    dragEl.addEventListener('touchstart', e=>{
      drag=true; const t=e.touches[0];
      sx=t.clientX; sy=t.clientY;
      const r=chatCont.getBoundingClientRect();
      sl=r.left; st=r.top;
      chatCont.style.right='auto'; chatCont.style.bottom='auto';
      chatCont.style.left=sl+'px'; chatCont.style.top=st+'px';
      e.preventDefault();
    }, {passive:false});
    window.addEventListener('touchmove', e=>{
      if(!drag)return; e.preventDefault();
      const t=e.touches[0];
      let l=Math.max(0, Math.min(window.innerWidth-chatCont.offsetWidth, sl+(t.clientX-sx)));
      let tp=Math.max(0, Math.min(window.innerHeight-chatCont.offsetHeight, st+(t.clientY-sy)));
      chatCont.style.left=l+'px'; chatCont.style.top=tp+'px';
    });
    window.addEventListener('touchend', ()=>drag=false);

    // Вкладки
    document.querySelectorAll('.auth-tab').forEach(t=>{
      t.addEventListener('click', ()=>{
        document.querySelectorAll('.auth-tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        loginForm.style.display = t.dataset.tab==='login'?'block':'none';
        regForm.style.display = t.dataset.tab==='login'?'none':'block';
      });
    });

    function showToast(msg){ toast.style.display='block'; toast.textContent=msg; setTimeout(()=>toast.style.display='none',2500); }

    // API
    async function api(url, method, body){
      const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:body?JSON.stringify(body):undefined});
      return r.json();
    }

    document.getElementById('login-btn').onclick = async ()=>{
      const l = document.getElementById('login-user').value.trim();
      const p = document.getElementById('login-pass').value;
      if(!l||!p) return showToast('Введите данные');
      const res = await api('/api/login','POST',{login:l,password:p});
      if(res.success){ currentUser=l; socket.emit('register-socket',{login:l}); loadCompanies(); mainScr.style.display='flex'; authScr.style.display='none'; userName.textContent=l; }
      else showToast(res.error||'Ошибка');
    };

    document.getElementById('register-btn').onclick = async ()=>{
      const l = document.getElementById('reg-user').value.trim();
      const p = document.getElementById('reg-pass').value;
      if(!l||!p) return showToast('Введите данные');
      const res = await api('/api/register','POST',{login:l,password:p});
      if(res.success){ document.querySelector('[data-tab="login"]').click(); showToast('Готово! Войдите'); }
      else showToast(res.error||'Ошибка');
    };

    document.getElementById('logout-btn').onclick = ()=>{
      currentUser=null; currentCompany=null;
      authScr.style.display='flex'; mainScr.style.display='none';
    };

    async function loadCompanies(){
      if(!currentUser) return;
      companies = await api(`/api/companies/${currentUser}`,'GET');
      renderChips();
    }

    function renderChips(){
      chipsDiv.innerHTML = '';
      companies.forEach(c=>{
        const chip = document.createElement('div');
        chip.className = 'company-chip' + (currentCompany===c.id?' active':'');
        chip.innerHTML = `<i class="fas fa-users"></i> ${c.name}`;
        chip.onclick = ()=> switchCompany(c.id);
        chipsDiv.appendChild(chip);
      });
    }

    function switchCompany(id){
      const c = companies.find(x=>x.id===id);
      if(!c) return;
      currentCompany = id;
      socket.emit('join-company', {companyId:id, login:currentUser});
      renderChips();
      addPanel.style.display = c.owner===currentUser ? 'flex' : 'none';
      chatMsgs.innerHTML = '';
    }

    socket.on('sync-state', s=>{ if(s&&s.url){ urlInp.value=s.url; navTo(s.url); } });
    socket.on('navigate', d=>{ urlInp.value=d.url; iframe.src=`/proxy?url=${encodeURIComponent(d.url)}&companyId=${currentCompany}`; });

    function navTo(url){
      if(!url.includes('://')) url='https://'+url;
      urlInp.value=url;
      iframe.src=`/proxy?url=${encodeURIComponent(url)}&companyId=${currentCompany}`;
      if(currentCompany) socket.emit('navigate',{companyId:currentCompany, url});
    }

    document.getElementById('go-btn').onclick = ()=> navTo(urlInp.value);
    document.getElementById('refresh-btn').onclick = ()=> iframe.src=iframe.src;
    document.getElementById('back-btn').onclick = ()=>{ try{iframe.contentWindow.history.back()}catch(e){} };
    document.getElementById('fwd-btn').onclick = ()=>{ try{iframe.contentWindow.history.forward()}catch(e){} };

    document.getElementById('create-company-btn').onclick = ()=> document.getElementById('company-modal').style.display='flex';
    document.getElementById('modal-cancel').onclick = ()=> document.getElementById('company-modal').style.display='none';
    document.getElementById('modal-create').onclick = async ()=>{
      const name = document.getElementById('new-company-name').value.trim();
      if(!name) return showToast('Название?');
      const res = await api('/api/companies','POST',{owner:currentUser,name});
      if(res.success){ document.getElementById('company-modal').style.display='none'; loadCompanies(); }
      else showToast(res.error);
    };

    document.getElementById('add-member-btn').onclick = async ()=>{
      const login = document.getElementById('add-member-input').value.trim();
      if(!login) return;
      const res = await api(`/api/companies/${currentCompany}/add-member`,'POST',{login, addedBy:currentUser});
      if(res.success){ document.getElementById('add-member-input').value=''; loadCompanies(); showToast('Добавлен'); }
      else showToast(res.error);
    };

    socket.on('member-added', ()=>{ loadCompanies(); });

    // Чат
    document.getElementById('chat-toggle').onclick = ()=> chatWin.classList.toggle('open');
    document.getElementById('close-chat').onclick = ()=> chatWin.classList.remove('open');

    function addMsg(from, txt, mine){
      const d=document.createElement('div');
      d.className = `msg ${mine?'mine':'other'}`;
      d.innerHTML = `<div class="name">${from}</div>${txt}`;
      chatMsgs.appendChild(d);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }
    function addVoice(from, data, mine){
      const d=document.createElement('div');
      d.className = `msg ${mine?'mine':'other'}`;
      d.innerHTML = `<div class="name">${from}</div>`;
      const v=document.createElement('div');
      v.className='voice-msg';
      const b=document.createElement('button');
      b.className='play-btn';
      b.innerHTML='<i class="fas fa-play"></i>';
      const a=new Audio(data);
      b.onclick=()=>a.play();
      v.appendChild(b);
      v.appendChild(document.createTextNode('Голосовое'));
      d.appendChild(v);
      chatMsgs.appendChild(d);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    document.getElementById('send-btn').onclick = ()=>{
      const txt = chatInp.value.trim();
      if(!txt||!currentCompany) return;
      socket.emit('chat-message',{companyId:currentCompany, from:currentUser, text:txt});
      addMsg(currentUser, txt, true);
      chatInp.value = '';
    };
    socket.on('chat-message', d=>{ if(d.from!==currentUser) addMsg(d.from, d.text, false); });

    document.getElementById('mic-btn').onclick = async ()=>{
      const btn = document.getElementById('mic-btn');
      if(!recording){
        try{
          const stream = await navigator.mediaDevices.getUserMedia({audio:true});
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = e=> audioChunks.push(e.data);
          mediaRecorder.onstop = ()=>{
            const blob = new Blob(audioChunks, {type:'audio/webm'});
            const r = new FileReader();
            r.onloadend = ()=>{
              socket.emit('voice-message',{companyId:currentCompany, from:currentUser, audioData:r.result});
              addVoice(currentUser, r.result, true);
            };
            r.readAsDataURL(blob);
            stream.getTracks().forEach(t=>t.stop());
          };
          mediaRecorder.start();
          btn.classList.add('rec');
          recording = true;
        }catch(e){ showToast('Нет доступа к микрофону'); }
      } else {
        mediaRecorder.stop();
        btn.classList.remove('rec');
        recording = false;
      }
    };
    socket.on('voice-message', d=>{ if(d.from!==currentUser) addVoice(d.from, d.audioData, false); });

    iframe.src = '/proxy?url=https://google.com&companyId=';
  })();
</script>
</body>
</html>
